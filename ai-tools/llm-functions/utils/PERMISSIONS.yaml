# Local AI Assistant Security Policy

# Paths that agents are STRICTLY forbidden from accessing
denied_paths:
  - "~/.ssh"
  - "~/.zsh_secrets"
  - "~/.gnupg"
  - "~/.aws"
  - "~/.config/gh"
  - "**/node_modules"
  - "**/.env"
  - "/etc"
  - "/private"

# Paths where agents have full read/write permission
allowed_paths:
  - "~/Notes"
  - "~/local-ai-assistant"
  - "~/Downloads"
  - "~/Documents"
  - "~/Desktop"
  - "~/Pictures"

# Specific patterns or commands that are globally blocked
blocked_patterns:
  - "chmod 777"
  - "rm -rf /"
  - "sudo"
